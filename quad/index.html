<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Comparison Tool</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; align-items: flex-start; padding: 20px; gap: 30px; color: #222; }
  .sidebar { width: 220px; flex-shrink: 0; }
  .container { margin-bottom: 6px; }
  label { display: block; margin-bottom: 2px; font-size: 13px; }
  input[type="range"] { width: 100%; margin: 0; }
  select { width: 100%; }

  .toggles { display: flex; gap: 4px; margin-bottom: 8px; }
  .toggles button {
    flex: 1; padding: 4px 2px; font-size: 11px; cursor: pointer;
    border: 1px solid #bbb; border-radius: 3px; background: #f0f0f0; color: #555;
  }
  .toggles button.active { background: #3a8a8a; color: white; border-color: #3a8a8a; }

  /* Equation table styles */
  .eq { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 2px; }
  .eq td { padding: 2px 6px; white-space: nowrap; }
  .eq .op { width: 14px; text-align: center; color: #888; font-weight: bold; }
  .eq .lbl { }
  .eq .val { text-align: right; font-variant-numeric: tabular-nums; padding: 1px 8px; border-radius: 3px; }
  .eq .detail { color: #888; font-size: 12px; }
  .eq .detail .lbl { padding-left: 12px; }
  .eq tr.result td { border-top: 2px solid #999; font-weight: bold; }
  .eq tr.result .val { font-size: 14px; }
  .eq tr.sep td { height: 4px; }

  /* Color classes for values */
  .c-income { background: rgba(76, 175, 80, 0.15); }
  .c-expense { background: rgba(244, 67, 54, 0.12); }
  .c-neutral { background: rgba(33, 150, 243, 0.10); }
  .c-result-pos { background: rgba(76, 175, 80, 0.25); }
  .c-result-neg { background: rgba(244, 67, 54, 0.20); }
  .c-equity { background: rgba(33, 150, 243, 0.18); }

  .section-title {
    font-size: 13px; font-weight: bold; color: #555; text-transform: uppercase; letter-spacing: 0.5px;
    margin: 12px 0 4px; padding-bottom: 2px; border-bottom: 1px solid #ddd;
  }
  .section-title:first-child { margin-top: 0; }

  h3 { margin: 0 0 8px; font-size: 18px; }

  .profit-box {
    border: 2px solid #3a8a8a; border-radius: 6px; padding: 10px; margin-top: 10px;
    background: linear-gradient(135deg, #f0fafa, #fafaf0);
  }
  .profit-box h4 { margin: 0 0 8px; font-size: 14px; color: #333; }
  .profit-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: 13px; }
  .profit-row .plbl { min-width: 100px; }
  .profit-row .pval { padding: 2px 8px; border-radius: 3px; font-variant-numeric: tabular-nums; }
  .profit-row .prate { font-size: 11px; color: #666; margin-left: 6px; }
  .profit-winner .plbl, .profit-winner .pval { font-weight: bold; }
  .profit-diff { font-size: 11px; color: #666; margin-top: 6px; padding-top: 4px; border-top: 1px solid #ddd; }

  .metric-row { display: flex; gap: 8px; margin-top: 6px; font-size: 12px; }
  .metric { background: #f5f5f5; border-radius: 4px; padding: 3px 8px; }
  .metric .metric-label { color: #888; }
  .metric .metric-value { font-weight: bold; }

  details { margin-top: 8px; font-size: 13px; }
  details summary { cursor: pointer; font-weight: bold; color: #555; }

  .note { font-size: 11px; color: #888; margin-top: 6px; line-height: 1.4; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="container">
    <label for="presetDropdown">Choose Preset:</label>
    <select id="presetDropdown">
      <option value="default">Default: Montreal 850k 4-plex 55k revenue</option>
    </select>
    <button id="savePreset">Save Preset AS</button>
    <button id="deletePreset">Delete Preset</button>
  </div>

  <div class="toggles">
    <button id="toggleMonthly">Annual</button>
    <button id="toggleTax" class="active">After Tax</button>
    <button id="toggleRefi">Refi</button>
  </div>

  <div class="container">
    <label for="initialInvestment">Invest $<span id="initialInvestmentValue">170000</span><span id="propertyPrice"></span></label>
    <input type="range" id="initialInvestment" value="170000" min="60000" max="200000" step="1000">
  </div>

  <div class="container">
    <label for="initialRent">Rent: $<span id="initialRentValue">50000</span>/yr (MRB <span id="mrbValue">??</span>x)</label>
    <input type="range" id="initialRent" value="50000" min="20000" max="80000" step="100">
  </div>

  <div class="container">
    <label for="annualStockGrowth">Stock Growth: <span id="annualStockGrowthValue">8</span>%/yr</label>
    <input type="range" id="annualStockGrowth" value="8" min="0" max="20" step="0.1">
  </div>

  <div class="container">
    <label for="annualPropertyGrowth">Property Growth: <span id="annualPropertyGrowthValue">4</span>%/yr</label>
    <input type="range" id="annualPropertyGrowth" value="4" min="0" max="10" step="0.1">
  </div>

  <div class="container">
    <label for="amortization">Amortization: <span id="amortizationValue">30</span> years</label>
    <input type="range" id="amortization" value="30" min="25" max="30" step="5">
  </div>

  <div class="container">
    <label for="interestRate">Mortgage Rate: <span id="interestRateValue">4.54</span>%</label>
    <input type="range" id="interestRate" value="4.54" min="1" max="10" step="0.01">
  </div>

  <div class="container">
    <label for="operatingCosts">Operating Costs: <span id="operatingCostsValue">1.5</span>% of value</label>
    <input type="range" id="operatingCosts" value="1.5" min="0" max="5" step="0.1">
  </div>

  <div class="container">
    <label for="rentalIncomeGrowth">Rent Growth: <span id="rentalIncomeGrowthValue">3</span>%/yr</label>
    <input type="range" id="rentalIncomeGrowth" value="3" min="0" max="10" step="0.1">
  </div>

  <div class="note">
    Tax rate: 45%. Capital gains: 50% inclusion.<br>
    Taxable income = rent - interest - opex.
  </div>
</div>

<div style="flex: 1; min-width: 0;">
  <div style="margin-bottom: 8px;">
    <label for="year" style="font-size: 14px; font-weight: bold;">Year <span id="yearValue">5</span></label>
    <input type="range" id="year" value="5" min="0" max="32" step="1" style="width: 100%;">
  </div>
  <div id="cashflowinfo"></div>
</div>

<script>
  let showMonthly = false;
  let showAfterTax = true;
  let showRefi = false;

  document.getElementById('toggleMonthly').addEventListener('click', function() {
    showMonthly = !showMonthly;
    this.textContent = showMonthly ? 'Monthly' : 'Annual';
    this.classList.toggle('active', showMonthly);
    calculateInvestments();
  });
  document.getElementById('toggleTax').addEventListener('click', function() {
    showAfterTax = !showAfterTax;
    this.textContent = showAfterTax ? 'After Tax' : 'Before Tax';
    this.classList.toggle('active', showAfterTax);
    calculateInvestments();
  });
  document.getElementById('toggleRefi').addEventListener('click', function() {
    showRefi = !showRefi;
    this.classList.toggle('active', showRefi);
    calculateInvestments();
  });

  function maxLoanAmount(cashFlow, interestRate, termYears, propertyValue, mortgageBalance, equityOnly = false) {
    const maxLoanFromEquity = propertyValue * 0.8 - mortgageBalance;
    if (equityOnly) return maxLoanFromEquity;
    if (cashFlow <= 0) return 0;
    const r = interestRate, n = termYears, P = cashFlow;
    if (r === 0) return Math.min(P * n, maxLoanFromEquity);
    return Math.min(maxLoanFromEquity, P * ((1 + r)**n - 1) / (r * (1 + r)**n));
  }

  function fmt(v) {
    if (typeof v !== 'number') return v;
    const neg = v < 0;
    const s = Math.abs(v).toLocaleString(undefined, {maximumFractionDigits: 0});
    return neg ? `(${s})` : s;
  }

  function fmtSigned(v) {
    if (typeof v !== 'number') return v;
    const s = Math.abs(v).toLocaleString(undefined, {maximumFractionDigits: 0});
    return v < 0 ? `- ${s}` : `+ ${s}`;
  }

  function colorClass(v, isExpense) {
    if (isExpense) return v > 0 ? 'c-expense' : 'c-income';
    return v >= 0 ? 'c-income' : 'c-expense';
  }

  function resultClass(v) {
    return v >= 0 ? 'c-result-pos' : 'c-result-neg';
  }

  function calculateInvestments() {
    const years = 32;
    const initialInvestment = parseFloat(document.getElementById('initialInvestment').value);
    const propertyPrice = initialInvestment / 0.20;
    document.getElementById('propertyPrice').innerText = ` (property $${propertyPrice.toFixed(0)})`;
    const initialRent = parseFloat(document.getElementById('initialRent').value);
    const MRB = propertyPrice / initialRent;
    document.getElementById('mrbValue').innerText = MRB.toFixed(1);
    const annualStockGrowth = parseFloat(document.getElementById('annualStockGrowth').value) / 100;
    const annualPropertyGrowth = parseFloat(document.getElementById('annualPropertyGrowth').value) / 100;
    const amortization = parseFloat(document.getElementById('amortization').value);
    const interestRate = parseFloat(document.getElementById('interestRate').value) / 100;
    const operatingCosts = parseFloat(document.getElementById('operatingCosts').value) / 100;
    const rentalIncomeGrowth = parseFloat(document.getElementById('rentalIncomeGrowth').value) / 100;
    const div = showMonthly ? 12 : 1;
    const period = showMonthly ? '/mo' : '/yr';
    const taxRate = 0.45;

    // === BEGINNING OF YEAR i ===
    let propertyValues = Array.from({length: years+1}, (_, i) => propertyPrice * (1 + annualPropertyGrowth)**i);
    let mortgageBalance = Array.from({length: years+1}, (_, i) =>
      i <= amortization ? (propertyPrice - initialInvestment) * ((1 + interestRate)**amortization - (1 + interestRate)**i) / ((1 + interestRate)**amortization - 1) : 0
    );

    // === DURING YEAR i ===
    let rentalIncomes = Array.from({length: years+1}, (_, i) => initialRent * (1 + rentalIncomeGrowth)**i);
    let operatingExpenses = propertyValues.map(v => v * operatingCosts);
    let debtService = Array.from({length: years+1}, (_, i) =>
      i < amortization ? (propertyPrice - initialInvestment) * interestRate * ((1 + interestRate)**amortization) / ((1 + interestRate)**amortization - 1) : 0
    );
    let interestPaid = Array.from({length: years+1}, (_, i) => mortgageBalance[i] * interestRate);
    let principalPaid = Array.from({length: years+1}, (_, i) => debtService[i] - interestPaid[i]);
    let cashFlows = Array.from({length: years+1}, (_, i) => rentalIncomes[i] - operatingExpenses[i] - debtService[i]);
    let taxableIncome = Array.from({length: years+1}, (_, i) => rentalIncomes[i] - interestPaid[i] - operatingExpenses[i]);
    let incomeTaxes = taxableIncome.map(v => v * taxRate);
    let afterTaxCashFlow = cashFlows.map((cf, i) => cf - incomeTaxes[i]);

    // === CUMULATIVE CASH FLOW: index i = after i complete years ===
    // [0] = 0 (no cash flow on day of purchase), [1] = year 0's CF, [2] = year 0+1 CF, etc.
    let cumulativeCashFlow = [0];
    let cumulativeAfterTaxCashFlow = [0];
    for (let i = 1; i <= years; i++) {
      cumulativeCashFlow[i] = cumulativeCashFlow[i-1] + cashFlows[i-1];
      cumulativeAfterTaxCashFlow[i] = cumulativeAfterTaxCashFlow[i-1] + afterTaxCashFlow[i-1];
    }

    // === STOCK (with cash flow adjustment) ===
    // All arrays use convention: index i = after i complete years
    // stockPortfolio[0] = initial investment (no growth), [1] = after 1 year, etc.
    let stockPortfolio = Array.from({length: years+1}, () => 0);
    stockPortfolio[0] = initialInvestment;
    for (let i = 1; i <= years; i++) {
      const cf = showAfterTax ? afterTaxCashFlow[i-1] : cashFlows[i-1];
      stockPortfolio[i] = stockPortfolio[i-1] * (1 + annualStockGrowth) - cf;
    }
    let stockProfit = stockPortfolio.map(v => v - initialInvestment);
    let stockProfitAfterTax = stockProfit.map(v => v > 0 ? v * (1 - 0.5 * taxRate) : v);

    // === CUMULATIVE property values: index i = after i complete years ===
    // [0] = purchase day (no growth), [1] = after 1 year of growth/payments, etc.
    // propertyValues[i] already has this convention: propertyValues[0] = purchase price
    // mortgageBalance[i] already has this convention: mortgageBalance[0] = initial loan
    let cumPV = propertyValues;
    let cumMB = mortgageBalance;
    let cumEquity = cumPV.map((v, i) => v - cumMB[i]);
    let cumAppreciation = cumPV.map(v => v - propertyPrice);
    let cumCapGainsTax = cumAppreciation.map(v => v * 0.5 * taxRate);
    let totalDebtPaid = cumMB.map((v, i) => mortgageBalance[0] - v);

    // === TOTAL PROFIT ===
    let rentalProfitBT = Array.from({length: years+1}, (_, i) => cumEquity[i] + cumulativeCashFlow[i] - initialInvestment);
    let rentalProfitAT = Array.from({length: years+1}, (_, i) => cumEquity[i] + cumulativeAfterTaxCashFlow[i] - initialInvestment - cumCapGainsTax[i]);

    let displayRentalProfit = showAfterTax ? rentalProfitAT : rentalProfitBT;
    let displayStockProfit = showAfterTax ? stockProfitAfterTax : stockProfit;
    let displayCumCF = showAfterTax ? cumulativeAfterTaxCashFlow : cumulativeCashFlow;
    const taxLabel = showAfterTax ? 'after tax' : 'before tax';

    let maxNewLoanAmounts = cashFlows.map((cf, i) => maxLoanAmount(cf, interestRate, amortization, propertyValues[i], mortgageBalance[i], true));

    function annualizedReturn(profit, yrs, initial) {
      if (yrs === 0) return 0;
      const total = initial + profit;
      if (total <= 0) return -100;
      return (Math.pow(total / initial, 1 / yrs) - 1) * 100;
    }

    // Find breakeven year
    let breakevenYear = null;
    for (let y = 1; y <= years; y++) {
      if (displayRentalProfit[y] >= displayStockProfit[y]) { breakevenYear = y; break; }
    }

    // === RENDER ===
    function generateCashflowInfo(i) {
      const displayCF = showAfterTax ? afterTaxCashFlow[i] : cashFlows[i];
      const cashOnCash = (displayCF / initialInvestment * 100);

      // Equation row builder
      function eqRow(op, label, value, cls, detail) {
        const trClass = detail ? ' class="detail"' : '';
        return `<tr${trClass}>
          <td class="op">${op}</td>
          <td class="lbl">${label}</td>
          <td class="val ${cls}">${fmt(Math.abs(value))}</td>
        </tr>`;
      }
      function eqResult(label, value) {
        const cls = resultClass(value);
        return `<tr class="result">
          <td class="op">=</td>
          <td class="lbl">${label}</td>
          <td class="val ${cls}">${fmt(value)}</td>
        </tr>`;
      }
      function eqSep() { return '<tr class="sep"><td colspan="3"></td></tr>'; }

      // === SECTION 1: CASH FLOW ===
      let html = `<h3>Year ${i} (age ${i + 31})</h3>`;
      html += `<div class="section-title">Cash Flow ${period} (${taxLabel})</div>`;
      html += `<table class="eq">`;
      html += eqRow('', 'Rental Income', rentalIncomes[i] / div, 'c-income');
      html += eqRow('−', 'Operating Expenses', operatingExpenses[i] / div, 'c-expense');
      html += eqRow('−', 'Debt Service', debtService[i] / div, 'c-expense');
      html += eqRow('', 'Interest', interestPaid[i] / div, 'c-expense', true);
      html += eqRow('', 'Principal', principalPaid[i] / div, 'c-income', true);
      if (showAfterTax) {
        html += eqRow('−', 'Income Tax', incomeTaxes[i] / div, 'c-expense');
      }
      html += eqResult('Cash Flow', displayCF / div);
      html += `</table>`;

      // Key metrics
      html += `<div class="metric-row">
        <div class="metric"><span class="metric-label">Cash-on-cash:</span> <span class="metric-value">${cashOnCash.toFixed(1)}%</span></div>
      </div>`;

      // === SECTION 2: BALANCE SHEET (end of year) ===
      const cumCF = displayCumCF[i];
      const netWorth = cumEquity[i] + cumCF;
      html += `<div class="section-title">Balance Sheet (end of year ${i})</div>`;
      html += `<table class="eq">`;
      html += eqRow('', 'Property Value', cumPV[i], 'c-neutral');
      html += eqRow(cumCF >= 0 ? '+' : '−', 'Cash (cumulative CF)', Math.abs(cumCF), colorClass(cumCF, false));
      html += eqRow('−', 'Mortgage', cumMB[i], 'c-expense');
      html += eqResult('Net Worth', netWorth);
      html += `</table>`;

      html += `<div class="metric-row">
        <div class="metric"><span class="metric-label">LTV:</span> <span class="metric-value">${(cumMB[i] / cumPV[i] * 100).toFixed(0)}%</span></div>
        <div class="metric"><span class="metric-label">Equity (no cash):</span> <span class="metric-value">$${fmt(cumEquity[i])}</span></div>
      </div>`;

      // === SECTION 3: TOTAL PROFIT ===
      html += `<div class="section-title">Total Profit Breakdown (${taxLabel})</div>`;
      html += `<table class="eq">`;
      html += eqRow('', 'Property Appreciation', cumAppreciation[i], 'c-income');
      html += eqRow('+', 'Total Debt Paid', totalDebtPaid[i], 'c-income');
      html += eqRow(fmtSigned(displayCumCF[i]).charAt(0), 'Cumulative Cash Flow', Math.abs(displayCumCF[i]), colorClass(displayCumCF[i], false));
      if (showAfterTax) {
        html += eqRow('−', 'Capital Gains Tax', cumCapGainsTax[i], 'c-expense');
      }
      html += eqResult('Total Profit (Real Estate)', displayRentalProfit[i]);
      html += `</table>`;

      // === PROFIT COMPARISON BOX ===
      const rp = displayRentalProfit[i];
      const sp = displayStockProfit[i];
      const rWins = rp >= sp;
      const rReturn = i > 0 ? annualizedReturn(rp, i, initialInvestment) : 0;
      const sReturn = i > 0 ? annualizedReturn(sp, i, initialInvestment) : 0;

      html += `<div class="profit-box">
        <h4>Real Estate vs. Stocks after ${i} year${i === 1 ? '' : 's'}</h4>
        <div class="profit-row ${rWins ? 'profit-winner' : ''}">
          <span class="plbl">Real Estate</span>
          <span class="pval ${resultClass(rp)}">$${fmt(rp)}</span>
          <span class="prate">${rReturn.toFixed(1)}%/yr</span>
        </div>
        <div class="profit-row ${!rWins ? 'profit-winner' : ''}">
          <span class="plbl">Stocks (${(annualStockGrowth*100).toFixed(1)}%)</span>
          <span class="pval ${resultClass(sp)}">$${fmt(sp)}</span>
          <span class="prate">${sReturn.toFixed(1)}%/yr</span>
        </div>
        <div class="profit-diff">
          ${rWins ? 'Real estate' : 'Stocks'} wins by $${fmt(Math.abs(rp - sp))}
          ${breakevenYear !== null ? ` &middot; RE breaks even at year ${breakevenYear}` : ' &middot; RE never catches up'}
        </div>
      </div>`;

      // === REFINANCING ===
      if (showRefi) {
        html += `<details open>
          <summary>Refinancing</summary>
          <table class="eq">
            ${eqRow('', 'Max New Loan (80% LTV)', maxNewLoanAmounts[i], 'c-neutral')}
          </table>
        </details>`;
      }

      document.getElementById('cashflowinfo').innerHTML = html;
    }

    const year_of_interest = parseInt(document.getElementById('year').value);
    generateCashflowInfo(year_of_interest);
  }

  document.querySelectorAll('input[type="range"]').forEach(input => {
    input.addEventListener('input', function() {
      document.getElementById(input.id + 'Value').innerText = input.value;
      calculateInvestments();
    });
  });

  document.getElementById('deletePreset').addEventListener('click', function() {
    const presetName = document.getElementById('presetDropdown').value;
    deletePreset(presetName);
    calculateInvestments();
  });

  document.getElementById('savePreset').addEventListener('click', function() {
    let presetNameDefault = document.getElementById('presetDropdown').value;
    presetName = prompt('Save preset as:', presetNameDefault);
    if (presetName) {
      savePreset(presetName);
      document.getElementById('presetDropdown').value = presetName;
      localStorage.setItem('lastPreset', presetName);
      calculateInvestments();
      alert(`Preset "${presetName}" saved`);
    }
  });

  function loadPresets() {
    const savedPresets = JSON.parse(localStorage.getItem('presets') || '{}');
    Object.keys(savedPresets).forEach(key => {
      const option = document.createElement('option');
      option.value = key;
      option.textContent = key;
      document.getElementById('presetDropdown').appendChild(option);
    });
  }

  function savePreset(name) {
    const preset = {
      initialInvestment: document.getElementById('initialInvestment').value,
      initialRent: document.getElementById('initialRent').value,
      annualStockGrowth: document.getElementById('annualStockGrowth').value,
      annualPropertyGrowth: document.getElementById('annualPropertyGrowth').value,
      amortization: document.getElementById('amortization').value,
      interestRate: document.getElementById('interestRate').value,
      operatingCosts: document.getElementById('operatingCosts').value,
      rentalIncomeGrowth: document.getElementById('rentalIncomeGrowth').value
    };
    const savedPresets = JSON.parse(localStorage.getItem('presets') || '{}');
    savedPresets[name] = preset;
    localStorage.setItem('presets', JSON.stringify(savedPresets));
    const dropdown = document.getElementById('presetDropdown');
    if (!dropdown.querySelector(`option[value="${name}"]`)) {
      const option = document.createElement('option');
      option.value = name;
      option.textContent = name;
      dropdown.appendChild(option);
    }
  }

  function deletePreset(name) {
    const savedPresets = JSON.parse(localStorage.getItem('presets') || '{}');
    delete savedPresets[name];
    localStorage.setItem('presets', JSON.stringify(savedPresets));
    if (name != 'default') {
      const dropdown = document.getElementById('presetDropdown');
      dropdown.removeChild(dropdown.querySelector(`option[value="${name}"]`));
    }
  }

  function applyPreset(presetName) {
    let preset;
    if (presetName === 'default') {
      preset = {
        initialInvestment: 170000, initialRent: 50000, annualStockGrowth: 8,
        annualPropertyGrowth: 4, amortization: 25, interestRate: 4.4,
        operatingCosts: 1.5, rentalIncomeGrowth: 3
      };
    } else {
      const savedPresets = JSON.parse(localStorage.getItem('presets') || '{}');
      preset = savedPresets[presetName];
    }
    if (!preset) return false;

    document.getElementById('initialInvestment').value = preset.initialInvestment;
    document.getElementById('initialRent').value = preset.initialRent;
    document.getElementById('annualStockGrowth').value = preset.annualStockGrowth;
    document.getElementById('annualPropertyGrowth').value = preset.annualPropertyGrowth;
    document.getElementById('amortization').value = preset.amortization;
    document.getElementById('interestRate').value = preset.interestRate;
    document.getElementById('operatingCosts').value = preset.operatingCosts;
    document.getElementById('rentalIncomeGrowth').value = preset.rentalIncomeGrowth;

    document.getElementById('initialInvestmentValue').textContent = preset.initialInvestment;
    document.getElementById('initialRentValue').textContent = preset.initialRent;
    document.getElementById('annualStockGrowthValue').textContent = preset.annualStockGrowth;
    document.getElementById('annualPropertyGrowthValue').textContent = preset.annualPropertyGrowth;
    document.getElementById('amortizationValue').textContent = preset.amortization;
    document.getElementById('interestRateValue').textContent = preset.interestRate;
    document.getElementById('operatingCostsValue').textContent = preset.operatingCosts;
    document.getElementById('rentalIncomeGrowthValue').textContent = preset.rentalIncomeGrowth;

    localStorage.setItem('lastPreset', presetName);
    calculateInvestments();
    return true;
  }

  document.getElementById('presetDropdown').addEventListener('change', function () {
    applyPreset(this.value);
  });

  window.onload = function () {
    loadPresets();
    const lastPreset = localStorage.getItem('lastPreset');
    if (lastPreset) {
      const dropdown = document.getElementById('presetDropdown');
      if (dropdown.querySelector(`option[value="${lastPreset}"]`)) {
        dropdown.value = lastPreset;
        applyPreset(lastPreset);
        return;
      }
    }
    calculateInvestments();
  };
</script>
</body>
</html>
