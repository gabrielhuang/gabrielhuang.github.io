<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Comparison Tool</title>
<!-- <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> -->
<style>
  body { font-family: Arial, sans-serif; display: flex; align-items: flex-start; padding: 20px; gap: 30px; }
  .sidebar { width: 220px; flex-shrink: 0; }
  .container { margin-bottom: 6px; }
  label { display: block; margin-bottom: 2px; font-size: 13px; }
  input[type="range"] { width: 100%; margin: 0; }
  select { width: 100%; }

  .toggles { display: flex; gap: 4px; margin-bottom: 8px; }
  .toggles button {
    flex: 1; padding: 4px 2px; font-size: 11px; cursor: pointer;
    border: 1px solid #999; border-radius: 3px; background: #eee;
  }
  .toggles button.active { background: #4bc0c0; color: white; border-color: #4bc0c0; }

  #cashflowinfo h4 { margin: 10px 0 4px; font-size: 13px; border-bottom: 1px solid #ddd; padding-bottom: 2px; }
  #cashflowinfo h3 { margin: 0 0 8px; }
  #cashflowinfo > div > div { margin-bottom: 1px; font-size: 13px; }

  .profit-comparison {
    border: 2px solid #4bc0c0; border-radius: 6px; padding: 8px; margin-top: 8px;
    background: #f0fafa;
  }
  .profit-comparison h4 { margin: 0 0 6px !important; border: none !important; font-size: 14px !important; }
  .profit-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; font-size: 13px; }
  .profit-row .label { font-weight: bold; }
  .profit-row .value { padding: 1px 6px; border-radius: 3px; }
  .profit-winner { font-weight: bold; }

  details { margin-top: 8px; font-size: 13px; }
  details summary { cursor: pointer; font-weight: bold; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="container">
    <label for="presetDropdown">Choose Preset:</label>
    <select id="presetDropdown">
      <option value="default">Default: Montreal 850k 4-plex 55k revenue</option>
    </select>
    <button id="savePreset">Save Preset AS</button>
    <button id="deletePreset">Delete Preset</button>
  </div>

  <div class="toggles">
    <button id="toggleMonthly">Annual</button>
    <button id="toggleTax" class="active">After Tax</button>
    <button id="toggleRefi">Refi</button>
  </div>

  <div class="container">
    <label for="initialInvestment">Invest $<span id="initialInvestmentValue">170000</span><span id="propertyPrice"></span></label>
    <input type="range" id="initialInvestment" value="170000" min="60000" max="200000" step="1000">
  </div>

  <div class="container">
    <label for="initialRent">Rent: $<span id="initialRentValue">50000</span> per year (MRB <span id="mrbValue">??</span>x)</label>
    <input type="range" id="initialRent" value="50000" min="20000" max="80000" step="100">
  </div>

  <div class="container">
    <label for="annualStockGrowth">Annual Stock Growth: <span id="annualStockGrowthValue">8</span>%</label>
    <input type="range" id="annualStockGrowth" value="8" min="0" max="20" step="0.1">
  </div>

  <div class="container">
    <label for="annualPropertyGrowth">Annual Property Growth: <span id="annualPropertyGrowthValue">4</span>%</label>
    <input type="range" id="annualPropertyGrowth" value="4" min="0" max="10" step="0.1">
  </div>

  <div class="container">
    <label for="amortization">Amortization: <span id="amortizationValue">30</span> years</label>
    <input type="range" id="amortization" value="30" min="25" max="30" step="5">
  </div>

  <div class="container">
    <label for="interestRate">Mortgage Interest Rate: <span id="interestRateValue">4.54</span>%</label>
    <input type="range" id="interestRate" value="4.54" min="1" max="10" step="0.01">
  </div>

  <div class="container">
    <label for="operatingCosts">Operating Costs (% of Property): <span id="operatingCostsValue">1.5</span>%</label>
    <input type="range" id="operatingCosts" value="1.5" min="0" max="5" step="0.1">
  </div>

  <div class="container">
    <label for="rentalIncomeGrowth">Rental Income Growth: <span id="rentalIncomeGrowthValue">3</span>%</label>
    <input type="range" id="rentalIncomeGrowth" value="3" min="0" max="10" step="0.1">
  </div>

  <div class="container">
    <label for="year">Details for year <span id="yearValue">5</span></label>
    <input type="range" id="year" value="5" min="0" max="32" step="1">
  </div>
  <div style="font-size: 11px; color: #666; margin-top: 4px;">
    Tax rate: 45%. Capital gains: 50% inclusion. Taxable income = rent - interest - operating expenses.
  </div>
</div>

<div>
  <!-- <canvas id="investmentChart"></canvas> -->
  <div id="cashflowinfo"></div>
</div>

<script>
  /* Chart commented out for now
  const ctx = document.getElementById('investmentChart').getContext('2d');
  let investmentChart = new Chart(ctx, {
    type: 'bar',
    data: { labels: [], datasets: [] },
    options: {
      animation: false,
      scales: { y: { min: -200000 } },
      plugins: { tooltip: { mode: 'index', intersect: false } },
      responsive: true, maintainAspectRatio: true,
    }
  });
  */

  // Toggle state
  let showMonthly = false;
  let showAfterTax = true;
  let showRefi = false;

  document.getElementById('toggleMonthly').addEventListener('click', function() {
    showMonthly = !showMonthly;
    this.textContent = showMonthly ? 'Monthly' : 'Annual';
    this.classList.toggle('active', showMonthly);
    calculateInvestments();
  });
  document.getElementById('toggleTax').addEventListener('click', function() {
    showAfterTax = !showAfterTax;
    this.textContent = showAfterTax ? 'After Tax' : 'Before Tax';
    this.classList.toggle('active', showAfterTax);
    calculateInvestments();
  });
  document.getElementById('toggleRefi').addEventListener('click', function() {
    showRefi = !showRefi;
    this.classList.toggle('active', showRefi);
    calculateInvestments();
  });

  function maxLoanAmount(cashFlow, interestRate, termYears, propertyValue, mortgageBalance, equityOnly = false) {
    const maxLoanFromEquity = propertyValue * 0.8 - mortgageBalance;
    if (equityOnly) return maxLoanFromEquity;
    if (cashFlow <= 0) return 0;
    const r = interestRate;
    const n = termYears;
    const P = cashFlow;
    if (r === 0) return Math.min(P * n, maxLoanFromEquity);
    else return Math.min(maxLoanFromEquity, P * ((1 + r)**n - 1) / (r * (1 + r)**n));
  }

  function fmt(v) {
    return typeof v === 'number' ? v.toLocaleString(undefined, {maximumFractionDigits: 0}) : v;
  }

  function calculateInvestments() {
    const years = 32;
    const initialInvestment = parseFloat(document.getElementById('initialInvestment').value);
    const propertyPrice = initialInvestment / 0.20;
    document.getElementById('propertyPrice').innerText = ` (property $${propertyPrice.toFixed(0)})`;
    const initialRent = parseFloat(document.getElementById('initialRent').value);
    const MRB = propertyPrice / initialRent;
    document.getElementById('mrbValue').innerText = MRB.toFixed(1);
    const annualStockGrowth = parseFloat(document.getElementById('annualStockGrowth').value) / 100;
    const annualPropertyGrowth = parseFloat(document.getElementById('annualPropertyGrowth').value) / 100;
    const amortization = parseFloat(document.getElementById('amortization').value);
    const interestRate = parseFloat(document.getElementById('interestRate').value) / 100;
    const operatingCosts = parseFloat(document.getElementById('operatingCosts').value) / 100;
    const rentalIncomeGrowth = parseFloat(document.getElementById('rentalIncomeGrowth').value) / 100;
    const div = showMonthly ? 12 : 1;
    const period = showMonthly ? '/mo' : '/yr';

    let taxRate = 0.45;

    // === BEGINNING OF YEAR i: snapshot values ===
    let propertyValues = Array.from({length: years+1}, (_, i) => propertyPrice * (1 + annualPropertyGrowth)**i);
    let mortgageBalance = Array.from({length: years+1}, (_, i) =>
      i <= amortization ? (propertyPrice - initialInvestment) * ((1 + interestRate)**amortization - (1 + interestRate)**i) / ((1 + interestRate)**amortization - 1) : 0
    );
    let equity = propertyValues.map((v, i) => v - mortgageBalance[i]);

    // === DURING YEAR i: flows ===
    let rentalIncomes = Array.from({length: years+1}, (_, i) => initialRent * (1 + rentalIncomeGrowth)**i);
    let operatingExpenses = propertyValues.map(v => v * operatingCosts);
    let debtService = Array.from({length: years+1}, (_, i) =>
      i < amortization ? (propertyPrice - initialInvestment) * interestRate * ((1 + interestRate)**amortization) / ((1 + interestRate)**amortization - 1) : 0
    );
    let interestPaid = Array.from({length: years+1}, (_, i) => mortgageBalance[i] * interestRate);
    let principalPaid = Array.from({length: years+1}, (_, i) => debtService[i] - interestPaid[i]);
    let cashFlows = Array.from({length: years+1}, (_, i) => rentalIncomes[i] - operatingExpenses[i] - debtService[i]);

    // Tax during year i
    let taxableIncome = Array.from({length: years+1}, (_, i) => rentalIncomes[i] - interestPaid[i] - operatingExpenses[i]);
    let incomeTaxes = taxableIncome.map(v => v * taxRate);
    let afterTaxCashFlow = cashFlows.map((cf, i) => cf - incomeTaxes[i]);

    // === END OF YEAR i: cumulative ===
    let cumulativeCashFlow = cashFlows.reduce((acc, curr, i) => [...acc, (acc[i-1] || 0) + curr], []);
    let cumulativeAfterTaxCashFlow = afterTaxCashFlow.reduce((acc, curr, i) => [...acc, (acc[i-1] || 0) + curr], []);

    // === STOCK COMPARISON ===
    // Stock strategy: invest initialInvestment, plus each year invest/withdraw the rental cash flow difference
    // If rental has negative cash flow of X, stock investor keeps that X (doesn't spend it)
    // If rental has positive cash flow of X, stock investor doesn't get it
    // So stock investor additionally invests -cashFlow each year (negative CF = positive stock contribution)
    let stockPortfolio = Array.from({length: years+1}, () => 0);
    stockPortfolio[0] = initialInvestment; // lump sum at start
    for (let i = 1; i <= years; i++) {
      const cf = showAfterTax ? afterTaxCashFlow[i-1] : cashFlows[i-1];
      // Grow previous portfolio, then add the cash flow the stock investor saves by not owning property
      // If rental CF is negative, stock investor also spends that money (opportunity cost is symmetric)
      // So stock investor adds (-cf) if cf < 0 (saves money), or subtracts cf if cf > 0 (misses out)
      stockPortfolio[i] = stockPortfolio[i-1] * (1 + annualStockGrowth) - cf;
    }
    let stockProfit = stockPortfolio.map(v => v - initialInvestment);
    let stockProfitAfterCapGains = stockProfit.map(v => v > 0 ? v * (1 - 0.5 * taxRate) : v);
    let displayStockProfit = showAfterTax ? stockProfitAfterCapGains : stockProfit;

    // === END-OF-YEAR property values ===
    let endOfYearEquity = Array.from({length: years+1}, (_, i) => {
      let pv = i < years ? propertyValues[i+1] : propertyValues[i] * (1 + annualPropertyGrowth);
      let mb = i < years ? mortgageBalance[i+1] : Math.max(0, mortgageBalance[i] - principalPaid[i]);
      return pv - mb;
    });
    let endOfYearAppreciation = Array.from({length: years+1}, (_, i) => {
      let pv = i < years ? propertyValues[i+1] : propertyValues[i] * (1 + annualPropertyGrowth);
      return pv - propertyPrice;
    });
    let endOfYearCapGainsTax = endOfYearAppreciation.map(v => v * 0.5 * taxRate);

    // === TOTAL PROFIT (REAL ESTATE) ===
    let rentalProfitBeforeTax = Array.from({length: years+1}, (_, i) =>
      endOfYearEquity[i] + cumulativeCashFlow[i] - initialInvestment
    );
    let rentalProfitAfterTax = Array.from({length: years+1}, (_, i) =>
      endOfYearEquity[i] + cumulativeAfterTaxCashFlow[i] - initialInvestment - endOfYearCapGainsTax[i]
    );
    let displayRentalProfit = showAfterTax ? rentalProfitAfterTax : rentalProfitBeforeTax;
    let displayCumulativeCF = showAfterTax ? cumulativeAfterTaxCashFlow : cumulativeCashFlow;
    const taxLabel = showAfterTax ? 'after tax' : 'before tax';

    let maxNewLoanAmounts = cashFlows.map((cf, i) => maxLoanAmount(cf, interestRate, amortization, propertyValues[i], mortgageBalance[i], true));

    // === ANNUALIZED RETURN ===
    function annualizedReturn(profit, years, initial) {
      if (years === 0) return 0;
      const total = initial + profit;
      if (total <= 0) return -100;
      return (Math.pow(total / initial, 1 / years) - 1) * 100;
    }

    // === RENDER ===
    function generateCashflowInfo(i) {
      const row = (label, value, color) => `
        <div>
          <strong>${label}:</strong>
          <span style="background-color: ${color}; padding: 1px 4px; border-radius: 2px;">${fmt(value)}</span>
        </div>`;

      const displayCF = showAfterTax ? afterTaxCashFlow[i] : cashFlows[i];

      let html = `<div>
        <h3>Year ${i} (age ${i + 31})</h3>

        <h4>Beginning of Year ${i}</h4>
        ${row('Property Value', propertyValues[i], 'rgba(75,192,192,0.8)')}
        ${row('Mortgage Balance', mortgageBalance[i], 'rgba(255,0,0,0.3)')}
        ${row('Equity', equity[i], 'rgba(75,192,192,0.3)')}

        <h4>During Year ${i}</h4>
        ${row('Gross Rental Income', rentalIncomes[i] / div, 'rgba(255,206,86,0.8)')}
        ${row('Operating Expenses', operatingExpenses[i] / div, 'rgba(54,162,235,0.4)')}
        ${row('Debt Service', debtService[i] / div, 'rgba(255,159,64,0.4)')}
        ${row('  Interest', interestPaid[i] / div, 'rgba(255,0,0,0.2)')}
        ${row('  Principal', principalPaid[i] / div, 'rgba(100,200,100,0.3)')}`;

      if (showAfterTax) {
        html += `
        ${row('Income Tax', incomeTaxes[i] / div, 'rgba(255,0,0,0.2)')}`;
      }

      html += `
        ${row('Cash Flow (' + taxLabel + ')' + period, displayCF / div, '#ffcc00')}

        <h4>End of Year ${i}</h4>
        ${row('Equity (EOY)', endOfYearEquity[i], 'rgba(75,192,192,0.3)')}
        ${row('Total Debt Paid', mortgageBalance[0] - (i < years ? mortgageBalance[i+1] : Math.max(0, mortgageBalance[i] - principalPaid[i])), 'rgba(100,200,100,0.3)')}
        ${row('Property Appreciation', endOfYearAppreciation[i], 'rgba(54,162,235,0.4)')}
        ${row('Cumulative Cash Flow (' + taxLabel + ')', displayCumulativeCF[i], '#c0f0c0')}`;

      if (showAfterTax) {
        html += `
        ${row('Capital Gains Tax', endOfYearCapGainsTax[i], 'rgba(255,0,0,0.2)')}`;
      }

      // Profit comparison box
      const rp = displayRentalProfit[i];
      const sp = displayStockProfit[i];
      const rWins = rp >= sp;
      const rReturn = i > 0 ? annualizedReturn(rp, i, initialInvestment) : 0;
      const sReturn = i > 0 ? annualizedReturn(sp, i, initialInvestment) : 0;

      html += `
      <div class="profit-comparison">
        <h4>Total Profit after ${i} years (${taxLabel})</h4>
        <div class="profit-row">
          <span class="label ${rWins ? 'profit-winner' : ''}">Real Estate:</span>
          <span class="value ${rWins ? 'profit-winner' : ''}" style="background:rgba(75,192,192,0.5)">
            $${fmt(rp)} (${rReturn.toFixed(1)}%/yr)
          </span>
        </div>
        <div class="profit-row">
          <span class="label ${!rWins ? 'profit-winner' : ''}">Stocks (${(annualStockGrowth*100).toFixed(1)}%):</span>
          <span class="value ${!rWins ? 'profit-winner' : ''}" style="background:rgba(255,150,40,0.5)">
            $${fmt(sp)} (${sReturn.toFixed(1)}%/yr)
          </span>
        </div>
        <div style="font-size:11px;color:#666;margin-top:4px;">
          Difference: $${fmt(rp - sp)} in favor of ${rWins ? 'real estate' : 'stocks'}
        </div>
      </div>`;

      // Refinancing (collapsible)
      if (showRefi) {
        html += `
        <details open>
          <summary>Refinancing</summary>
          ${row('Max New Loan (80% LTV)', maxNewLoanAmounts[i], 'rgba(255,255,0,0.4)')}
        </details>`;
      }

      html += `</div>`;
      document.getElementById('cashflowinfo').innerHTML = html;
    }

    const year_of_interest = parseInt(document.getElementById('year').value);
    generateCashflowInfo(year_of_interest);
  }

  document.querySelectorAll('input[type="range"]').forEach(input => {
    input.addEventListener('input', function() {
      document.getElementById(input.id + 'Value').innerText = input.value;
      calculateInvestments();
    });
  });

  document.getElementById('deletePreset').addEventListener('click', function() {
    const presetName = document.getElementById('presetDropdown').value;
    deletePreset(presetName);
    calculateInvestments();
  });

  document.getElementById('savePreset').addEventListener('click', function() {
    let presetNameDefault = document.getElementById('presetDropdown').value;
    presetName = prompt('Save preset as:', presetNameDefault);
    if (presetName) {
      savePreset(presetName);
      document.getElementById('presetDropdown').value = presetName;
      calculateInvestments();
      alert(`Preset "${presetName}" saved`);
    }
  });

  function loadPresets() {
    const savedPresets = JSON.parse(localStorage.getItem('presets') || '{}');
    Object.keys(savedPresets).forEach(key => {
      const option = document.createElement('option');
      option.value = key;
      option.textContent = key;
      document.getElementById('presetDropdown').appendChild(option);
    });
  }

  function savePreset(name) {
    const preset = {
      initialInvestment: document.getElementById('initialInvestment').value,
      initialRent: document.getElementById('initialRent').value,
      annualStockGrowth: document.getElementById('annualStockGrowth').value,
      annualPropertyGrowth: document.getElementById('annualPropertyGrowth').value,
      amortization: document.getElementById('amortization').value,
      interestRate: document.getElementById('interestRate').value,
      operatingCosts: document.getElementById('operatingCosts').value,
      rentalIncomeGrowth: document.getElementById('rentalIncomeGrowth').value
    };
    const savedPresets = JSON.parse(localStorage.getItem('presets') || '{}');
    savedPresets[name] = preset;
    localStorage.setItem('presets', JSON.stringify(savedPresets));
    const dropdown = document.getElementById('presetDropdown');
    if (!dropdown.querySelector(`option[value="${name}"]`)) {
      const option = document.createElement('option');
      option.value = name;
      option.textContent = name;
      dropdown.appendChild(option);
    }
  }

  function deletePreset(name) {
    const savedPresets = JSON.parse(localStorage.getItem('presets') || '{}');
    delete savedPresets[name];
    localStorage.setItem('presets', JSON.stringify(savedPresets));
    if (name != 'default') {
      const dropdown = document.getElementById('presetDropdown');
      dropdown.removeChild(dropdown.querySelector(`option[value="${name}"]`));
    }
  }

  document.getElementById('presetDropdown').addEventListener('change', function () {
    const presetName = this.value;
    let preset;
    if (this.value === 'default') {
      preset = {
        initialInvestment: 170000, initialRent: 50000, annualStockGrowth: 8,
        annualPropertyGrowth: 4, amortization: 25, interestRate: 4.4,
        operatingCosts: 1.5, rentalIncomeGrowth: 3
      };
    } else {
      const savedPresets = JSON.parse(localStorage.getItem('presets') || '{}');
      preset = savedPresets[presetName];
    }
    if(!preset) { alert('No preset found with name', presetName); return; }

    document.getElementById('initialInvestment').value = preset.initialInvestment;
    document.getElementById('initialRent').value = preset.initialRent;
    document.getElementById('annualStockGrowth').value = preset.annualStockGrowth;
    document.getElementById('annualPropertyGrowth').value = preset.annualPropertyGrowth;
    document.getElementById('amortization').value = preset.amortization;
    document.getElementById('interestRate').value = preset.interestRate;
    document.getElementById('operatingCosts').value = preset.operatingCosts;
    document.getElementById('rentalIncomeGrowth').value = preset.rentalIncomeGrowth;

    document.getElementById('initialInvestmentValue').textContent = preset.initialInvestment;
    document.getElementById('initialRentValue').textContent = preset.initialRent;
    document.getElementById('annualStockGrowthValue').textContent = preset.annualStockGrowth;
    document.getElementById('annualPropertyGrowthValue').textContent = preset.annualPropertyGrowth;
    document.getElementById('amortizationValue').textContent = preset.amortization;
    document.getElementById('interestRateValue').textContent = preset.interestRate;
    document.getElementById('operatingCostsValue').textContent = preset.operatingCosts;
    document.getElementById('rentalIncomeGrowthValue').textContent = preset.rentalIncomeGrowth;
    calculateInvestments();
  });

  window.onload = function () {
    loadPresets();
    calculateInvestments();
  };

</script>

</body>
</html>
